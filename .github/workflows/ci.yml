name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests
        run: go test -v -count=1 ./internal/...

  integration-tests-go:
    name: Integration Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        run: make build

      - name: Run Go integration tests
        run: cd test/integration && HOME_STORE_BIN=../../bin/home-store go test -v -count=1 -timeout 120s ./...

  integration-tests-python:
    name: Integration Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv sync
        working-directory: test/integration/python

      - name: Build binary
        run: make build

      - name: Run Python integration tests
        run: HOME_STORE_BIN=../../bin/home-store pytest -v
        working-directory: test/integration/python
