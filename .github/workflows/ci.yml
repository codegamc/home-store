name: CI

on:
  pull_request:
    branches: ["*"]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests
        run: go test -race -v -count=1 ./internal/...

  fuzz-smoke:
    name: Fuzz Smoke (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/auth
            target: FuzzAWSEncode
          - package: ./internal/auth
            target: FuzzCanonicalQuery
          - package: ./internal/api
            target: FuzzParseRange
          - package: ./internal/storage
            target: FuzzObjectKeyValidation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run bounded fuzz target
        run: go test -run='^$' -fuzz='^${{ matrix.target }}$' -fuzztime=5s '${{ matrix.package }}'

  integration-tests-go:
    name: Integration Tests (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build race-enabled binary
        run: go build -race -o bin/home-store-race ./cmd/home-store

      - name: Run Go integration tests
        run: cd test/integration && HOME_STORE_BIN=../../bin/home-store-race go test -race -v -count=1 -timeout 120s ./...

  integration-tests-python:
    name: Integration Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"

      - name: Install Python dependencies
        run: uv sync
        working-directory: test/integration/python

      - name: Build binary
        run: make build

      - name: Run Python integration tests
        run: HOME_STORE_BIN=../../bin/home-store uv run pytest -v
        working-directory: test/integration/python

  container-smoke:
    name: Container Build and Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t home-store:test -f docker/Dockerfile .
      - name: Start image
        run: |
          docker run -d --name home-store -p 9000:9000 \
            -e HOME_STORE_ACCESS_KEY=test-access-key \
            -e HOME_STORE_SECRET_KEY=test-secret-key \
            -v home-store-ci:/var/lib/home-store home-store:test
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:9000/health/ready && exit 0
            sleep 1
          done
          docker logs home-store
          exit 1
      - name: Stop cleanly
        run: docker stop -t 30 home-store
