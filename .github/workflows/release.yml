name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goarch: amd64, suffix: linux-amd64}
          - {goarch: arm64, suffix: linux-arm64}
          - {goarch: arm, goarm: "7", suffix: linux-armv7}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: "1.25"}
      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA}" \
            -o "dist/home-store-${{ matrix.suffix }}" ./cmd/home-store
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: dist/*

  synology:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goarch: amd64, synoarch: x86_64}
          - {goarch: arm64, synoarch: armv8}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version: "1.25"}
      - name: Build SPK
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA}" \
            -o dist/home-store ./cmd/home-store
          ./synology/build-spk.sh "${{ matrix.synoarch }}" "$GITHUB_REF_NAME" dist/home-store \
            "dist/home-store-${GITHUB_REF_NAME}-${{ matrix.synoarch }}.spk"
      - uses: actions/upload-artifact@v4
        with:
          name: spk-${{ matrix.synoarch }}
          path: dist/*.spk

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }},ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  publish:
    needs: [binaries, synology, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
